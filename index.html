<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Interventions - DIP ASCENSEURS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f6fa; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0f172a; color: white; padding: 14px 16px; text-align: center; font-size: 18px; font-weight: 600; }
    main { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 100%; max-width: 1000px; height: 85vh; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
    footer { text-align: center; padding: 10px; font-size: 12px; color: #6b7280; }
    @media (max-width: 768px) { main { padding: 0; } .chat-container { height: 100%; max-width: 100%; border-radius: 0; } }
    
    .vfrc-extension-form { padding: 15px; background-color: #fff; max-height: 550px; overflow-y: auto; width: 100%; }
    .category-title { color: #f59e0b; font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px 0; border-bottom: 2px solid #fef3c7; padding-bottom: 5px; }
    .control-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; width: 100%; }
    .control-name { font-size: 0.95em; font-weight: 600; color: #1e293b; margin-bottom: 12px; display: block; }

    .status-group { display: flex; flex-direction: row !important; gap: 10px; margin-bottom: 15px; width: 100%; }
    .status-label { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; font-size: 0.9em; display: flex; align-items: center; justify-content: center; gap: 8px; background: white; transition: 0.2s; }
    
    input[type="radio"] { display: none; }
    input[value="C"]:checked + .status-label { background: #dcfce7; border-color: #22c55e; color: #166534; font-weight: bold; }
    input[value="C"]:checked + .status-label::before { content: "✓"; }
    input[value="NC"]:checked + .status-label { background: #fee2e2; border-color: #ef4444; color: #991b1b; font-weight: bold; }
    input[value="NC"]:checked + .status-label::before { content: "✗"; }
    
    .extra-fields { display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #e2e8f0; padding-top: 12px; width: 100%; }
    .photo-section { display: flex; flex-direction: column; gap: 5px; width: 100%; }
    .photo-text { font-size: 0.85em; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 5px; }
    .extra-fields textarea { width: 100% !important; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.9em; resize: none; min-height: 80px; }
  </style>
</head>
<body>
  <header>Assistant Interventions - DIP ASCENSEURSV17</header>
  <main><div class="chat-container" id="voiceflow-chat"></div></main>
  <footer>Support technique · DIP Ascenseurs</footer>

<script type="text/javascript">
  const AirtableFormExtension = {
    name: 'Airtable_Inspection_Form',
    type: 'response',
    match: ({ trace }) => trace.type === 'Airtable_Inspection_Form' || trace.payload?.name === 'Airtable_Inspection_Form',
    render: async ({ trace, element }) => {
      const typeFiltre = trace.payload?.type_visite || 'A';
      const airtableToken = 'patRrGH5GsUnBaVyt.98a09846a0e564f6daea7c3586adb0b021b061c24e4dfd0096bd0c04f35a7af3';
      const baseId = 'appelq7pZAQm5wBhi';
      const tableId = 'tblFhCTVGZI3vAA02';

      try {
        const response = await fetch(`https://api.airtable.com/v0/${baseId}/${tableId}?filterByFormula={Type_visite}='${typeFiltre}'`, {
          headers: { Authorization: `Bearer ${airtableToken}` }
        });
        const data = await response.json();

        const formContainer = document.createElement('div');
        formContainer.className = 'vfrc-extension-form';
        formContainer.innerHTML = `<h4 style="margin-bottom:15px; color:#0f172a;">📝 Rapport de visite ${typeFiltre}</h4>`;

        // Regroupement par Point de contrôle (Catégorie)
        const categories = [...new Set(data.records.map(r => r.fields.Point_de_contrôle))];
        
        categories.forEach(cat => {
          const catDiv = document.createElement('div');
          catDiv.className = 'category-title';
          catDiv.innerText = cat || "Général";
          formContainer.appendChild(catDiv);

          data.records.filter(r => r.fields.Point_de_contrôle === cat).forEach(record => {
            const ctrl = record.fields.Contrôle;
            const item = document.createElement('div');
            item.className = 'control-item';
            item.innerHTML = `
              <span class="control-name">${ctrl}</span>
              <div class="status-group">
                <label style="flex:1;"><input type="radio" name="status-${ctrl}" value="C"><div class="status-label">Conforme</div></label>
                <label style="flex:1;"><input type="radio" name="status-${ctrl}" value="NC"><div class="status-label">Non conforme</div></label>
              </div>
              <div class="extra-fields">
                <div class="photo-section">
                  <span class="photo-text">📷 Prendre une photo</span>
                  <input type="file" accept="image/*" capture="environment" id="photo-${ctrl}" style="font-size: 0.8em; width: 100%;">
                </div>
                <textarea id="comm-${ctrl}" placeholder="Observations ou détails NC..." rows="3"></textarea>
              </div>`;
            formContainer.appendChild(item);
          });
        });

        const btn = document.createElement('button');
        btn.innerText = "Soumettre le rapport complet";
        btn.style = "background:#f59e0b; color:white; border:none; padding:16px; width:100%; border-radius:10px; cursor:pointer; margin-top:15px; font-weight:700; font-size:1em;";
        
        btn.onclick = () => {
          const results = data.records.map(r => ({
            contrôle: r.fields.Contrôle,
            résultat: formContainer.querySelector(`input[name="status-${r.fields.Contrôle}"]:checked`)?.value || "NR",
            commentaire: document.getElementById(`comm-${r.fields.Contrôle}`).value
          }));
          btn.disabled = true;
          btn.innerText = "Envoi...";
          window.voiceflow.chat.interact({ type: 'complete', payload: { data: results } });
        };
        
        formContainer.appendChild(btn);
        element.appendChild(formContainer);
      } catch (e) {
        console.error("Erreur Airtable:", e);
      }
    }
  };

  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '698e23a65b76a37297e3f819' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          render: { mode: 'embedded', target: document.getElementById('voiceflow-chat') },
          assistant: { extensions: [AirtableFormExtension] }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>
</body>
</html>
