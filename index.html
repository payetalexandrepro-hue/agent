<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Interventions</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 14px 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    main {
      flex: 1;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 100%;
      min-height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (min-width: 768px) {
      .chat-container {
        min-height: 600px;
      }
    }
  </style>
</head>

<body>

  <header>
    Assistant Interventions
  </header>

  <main>
    <div class="chat-container" id="voiceflow-chat"></div>
  </main>

  <footer>
    Support technique · Interventions
  </footer>

<script type="text/javascript">
  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '698e23a65b76a37297e3f819' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          voice: {
            url: "https://runtime-api.voiceflow.com"
          }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>

</body>
</html>
