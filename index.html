<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Interventions - DIP ASCENSEURS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f6fa; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0f172a; color: white; padding: 14px 16px; text-align: center; font-size: 18px; font-weight: 600; }
    main { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 100%; max-width: 1000px; height: 85vh; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
    footer { text-align: center; padding: 10px; font-size: 12px; color: #6b7280; }
    @media (max-width: 768px) {
      main { padding: 0; }
      .chat-container { height: 100%; max-width: 100%; border-radius: 0; }
    }
    .vfrc-extension-form { padding: 15px; background-color: #fff; max-height: 500px; overflow-y: auto; }
  </style>
</head>
<body>
  <header>Assistant Interventions - DIP ASCENSEURSV23</header>
  <main><div class="chat-container" id="voiceflow-chat"></div></main>
  <footer>Support technique · DIP Ascenseurs</footer>

<script type="text/javascript">
  const AirtableFormExtension = {
    name: 'Airtable_Inspection_Form',
    type: 'response',
    match: ({ trace }) => trace.type === 'Airtable_Inspection_Form' || trace.payload?.name === 'Airtable_Inspection_Form',
    render: async ({ trace, element }) => {
      // RÉCUPÉRATION SÉCURISÉE : On utilise les données envoyées par l'API Voiceflow
      const airtableRecords = trace.payload?.airtable_data || [];
      const typeFiltre = trace.payload?.type_visite || 'A';

      // Groupement par catégorie (Point de contrôle)
      const groups = airtableRecords.reduce((acc, record) => {
        const pt = record.fields.Point_de_contrôle || "Général";
        if (!acc[pt]) acc[pt] = [];
        acc[pt].push(record.fields.Contrôle);
        return acc;
      }, {});

      const formContainer = document.createElement('div');
      formContainer.className = 'vfrc-extension-form';
      formContainer.innerHTML = `<h4 style="margin-bottom:12px; color:#0f172a;">📝 Rapport de visite ${typeFiltre}</h4>`;

      Object.keys(groups).forEach(groupName => {
        const groupDiv = document.createElement('div');
        groupDiv.innerHTML = `<div style="font-weight:bold; color:#f59e0b; margin: 15px 0 8px 0; font-size:0.9em; text-transform:uppercase;">${groupName}</div>`;

        groups[groupName].forEach(control => {
          const item = document.createElement('div');
          item.style = "background:#f8fafc; padding:10px; border-radius:8px; margin-bottom:8px; border: 1px solid #e2e8f0;";
          item.innerHTML = `
            <div style="font-size:0.85em; margin-bottom:6px; color:#334155; font-weight:600;">${control}</div>
            <div style="display:flex; gap:20px; margin-bottom:10px;">
              <label style="font-size:0.8em; cursor:pointer;"><input type="radio" name="status-${control}" value="C"> Conforme</label>
              <label style="font-size:0.8em; cursor:pointer;"><input type="radio" name="status-${control}" value="NC"> Non conforme</label>
            </div>
            <div style="margin-top:10px; padding-top:10px; border-top: 1px solid #e2e8f0; display:flex; flex-direction:column; gap:8px;">
              <div>
                <span style="font-size:0.8em; font-weight:600; color:#475569; display:block; margin-bottom:4px;">📷 Prendre une photo</span>
                <input type="file" accept="image/*" capture="environment" id="photo-${control}" style="font-size:0.75em; width:100%;">
              </div>
              <textarea id="comm-${control}" placeholder="Observations..." rows="2" style="width:100%; padding:6px; border:1px solid #cbd5e1; border-radius:6px; font-size:0.8em; resize:none;"></textarea>
            </div>`;
          groupDiv.appendChild(item);
        });
        formContainer.appendChild(groupDiv);
      });

      const btn = document.createElement('button');
      btn.innerText = "Soumettre le rapport d'intervention";
      btn.style = "background:#f59e0b; color:white; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; margin-top:15px; font-weight:600;";
      
      btn.onclick = () => {
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        const formData = {};

        // On boucle sur les contrôles initiaux pour construire le payload complet
        airtableRecords.forEach(record => {
          const ctrl = record.fields.Contrôle;
          
          // Récupération Status
          const radio = formContainer.querySelector(`input[name="status-${ctrl}"]:checked`);
          const statusValue = radio ? radio.value : "NR";

          // Récupération Commentaire
          const commentValue = document.getElementById(`comm-${ctrl}`).value;

          // Récupération Photo (nom du fichier)
          const photoInput = document.getElementById(`photo-${ctrl}`);
          const photoName = photoInput.files.length > 0 ? photoInput.files[0].name : "Pas de photo";

          formData[ctrl] = {
            resultat: statusValue,
            commentaire: commentValue,
            photo: photoName
          };
        });

        // Envoi des données structurées à Voiceflow
        window.voiceflow.chat.interact({ 
          type: 'complete', 
          payload: { 
            data: formData 
          } 
        });
      };
      
      formContainer.appendChild(btn);
      element.appendChild(formContainer);
    }
  };

  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '698e23a65b76a37297e3f819' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          render: { mode: 'embedded', target: document.getElementById('voiceflow-chat') },
          assistant: { extensions: [AirtableFormExtension] }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>
</body>
</html>
