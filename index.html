<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Interventions - DIP ASCENSEURS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f6fa; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0f172a; color: white; padding: 14px 16px; text-align: center; font-size: 18px; font-weight: 600; }
    main { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 100%; max-width: 1000px; height: 85vh; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
    footer { text-align: center; padding: 10px; font-size: 12px; color: #6b7280; }
    @media (max-width: 768px) { main { padding: 0; } .chat-container { height: 100%; max-width: 100%; border-radius: 0; } }
    
    .vfrc-extension-form { padding: 15px; background-color: #fff; max-height: 550px; overflow-y: auto; width: 100%; }
    
    /* Design des titres de groupes */
    .group-title { font-weight: bold; color: #f59e0b; margin: 20px 0 10px 0; font-size: 0.9em; text-transform: uppercase; border-bottom: 1px solid #fef3c7; padding-bottom: 5px; }
    
    /* Design du container gris par item */
    .control-item { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .control-name { font-size: 0.9em; margin-bottom: 10px; color: #334155; font-weight: 600; }

    /* Alignement Conforme / Non conforme sur une ligne */
    .status-group { display: flex; gap: 10px; margin-bottom: 12px; }
    .status-label { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; cursor: pointer; font-size: 0.85em; background: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    input[type="radio"] { display: none; }
    input[value="C"]:checked + .status-label { background: #dcfce7; border-color: #22c55e; color: #166534; font-weight: bold; }
    input[value="NC"]:checked + .status-label { background: #fee2e2; border-color: #ef4444; color: #991b1b; font-weight: bold; }

    /* Photo et Commentaire */
    .extra-fields { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
    .photo-section { display: flex; flex-direction: column; gap: 4px; }
    .photo-text { font-size: 0.8em; font-weight: 600; color: #64748b; }
    .extra-fields textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85em; resize: none; min-height: 60px; }
  </style>
</head>
<body>
  <header>Assistant Interventions - DIP ASCENSEURSV18</header>
  <main><div class="chat-container" id="voiceflow-chat"></div></main>
  <footer>Support technique · DIP Ascenseurs</footer>

<script type="text/javascript">
  const AirtableFormExtension = {
    name: 'Airtable_Inspection_Form',
    type: 'response',
    match: ({ trace }) => trace.type === 'Airtable_Inspection_Form' || trace.payload?.name === 'Airtable_Inspection_Form',
    render: async ({ trace, element }) => {
      const typeFiltre = trace.payload?.type_visite || 'A';
      const airtableToken = 'patRrGH5GsUnBaVyt.98a09846a0e564f6daea7c3586adb0b021b061c24e4dfd0096bd0c04f35a7af3';
      const baseId = 'appelq7pZAQm5wBhi';
      const tableId = 'tblFhCTVGZI3vAA02';

      const response = await fetch(`https://api.airtable.com/v0/${baseId}/${tableId}?filterByFormula={Type_visite}='${typeFiltre}'`, {
        headers: { Authorization: `Bearer ${airtableToken}` }
      });
      const data = await response.json();

      // LOGIQUE DE GROUPE : On trie les données par catégorie
      const groups = data.records.reduce((acc, record) => {
        const pt = record.fields.Point_de_contrôle || "Général";
        if (!acc[pt]) acc[pt] = [];
        acc[pt].push(record.fields.Contrôle);
        return acc;
      }, {});

      const formContainer = document.createElement('div');
      formContainer.className = 'vfrc-extension-form';
      formContainer.innerHTML = `<h4 style="margin-bottom:12px; color:#0f172a;">📝 Rapport de visite ${typeFiltre}</h4>`;

      // On parcourt chaque groupe (ex: Organes de sécurité)
      Object.keys(groups).forEach(groupName => {
        const groupDiv = document.createElement('div');
        groupDiv.innerHTML = `<div class="group-title">${groupName}</div>`;
        
        // Pour chaque item du groupe, on crée le container gris
        groups[groupName].forEach(control => {
          const item = document.createElement('div');
          item.className = 'control-item';
          item.innerHTML = `
            <div class="control-name">${control}</div>
            <div class="status-group">
              <label style="flex:1;"><input type="radio" name="status-${control}" value="C"><div class="status-label">Conforme</div></label>
              <label style="flex:1;"><input type="radio" name="status-${control}" value="NC"><div class="status-label">Non conforme</div></label>
            </div>
            <div class="extra-fields">
              <div class="photo-section">
                <span class="photo-text">📷 Prendre une photo</span>
                <input type="file" accept="image/*" capture="environment" id="photo-${control}" style="font-size:0.75em;">
              </div>
              <textarea id="comm-${control}" placeholder="Commentaire / Observations..." rows="2"></textarea>
            </div>`;
          groupDiv.appendChild(item);
        });
        
        // On ajoute le groupe entier (titre + tous ses items) au formulaire
        formContainer.appendChild(groupDiv);
      });

      const btn = document.createElement('button');
      btn.innerText = "Soumettre le rapport complet";
      btn.style = "background:#f59e0b; color:white; border:none; padding:15px; width:100%; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:700;";
      
      btn.onclick = () => {
        const results = [];
        data.records.forEach(r => {
          const ctrl = r.fields.Contrôle;
          results.push({
            contrôle: ctrl,
            résultat: formContainer.querySelector(`input[name="status-${ctrl}"]:checked`)?.value || "NR",
            commentaire: document.getElementById(`comm-${ctrl}`).value
          });
        });
        btn.disabled = true;
        btn.innerText = "Envoi...";
        window.voiceflow.chat.interact({ type: 'complete', payload: { data: results } });
      };
      
      formContainer.appendChild(btn);
      element.appendChild(formContainer);
    }
  };

  (function(d, t) {
      var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
      v.onload = function() {
        window.voiceflow.chat.load({
          verify: { projectID: '698e23a65b76a37297e3f819' },
          url: 'https://general-runtime.voiceflow.com',
          versionID: 'production',
          render: { mode: 'embedded', target: document.getElementById('voiceflow-chat') },
          assistant: { extensions: [AirtableFormExtension] }
        });
      }
      v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>
</body>
</html>
